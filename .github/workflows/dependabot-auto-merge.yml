name: Dependabot auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    if: ${{ github.actor == 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Auto-merge minor/patch
        if: ${{ steps.meta.outputs.update-type == 'version-update:semver-minor' || steps.meta.outputs.update-type == 'version-update:semver-patch' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          PR="${{ steps.meta.outputs.pr-number }}"
          if [ -z "$PR" ]; then
            PR=$(gh pr list --author "app/dependabot" --json number,headRefName --limit 100 --jq ".[]|select(.headRefName==\"${{ github.ref_name }}\")|.number" | head -n1)
          fi
          [ -z "$PR" ] && { echo "No PR found"; exit 0; }
          gh pr merge --auto --squash "$PR"
